apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: acm-fleet

resources:
- namespace.yaml
- serviceaccount.yaml
- clusterrole.yaml
- clusterrolebinding.yaml
- backend-deployment.yaml
- backend-service.yaml
- frontend-deployment.yaml
- frontend-service.yaml
- route.yaml

commonLabels:
  app: acm-fleet

images:
- name: quay.io/bzhai/acm-fleet-backend
  newTag: latest
- name: quay.io/bzhai/acm-fleet-frontend
  newTag: latest

