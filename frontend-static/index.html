<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACM Fleet Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script>
        // Apply theme BEFORE body renders to prevent flash
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
        }
    </script>
</head>
<body>
    <header class="site-header">
        <div class="container site-header__inner">
            <div>
                <h1 class="site-header__title">ACM Fleet Dashboard</h1>
                <p class="site-header__subtitle">Unified view across ACM hubs, spoke clusters, and policies</p>
            </div>
            <div class="site-header__actions">
                <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Dark/Light Mode">
                    <span id="theme-icon">🌙</span>
                    <span id="theme-text">Dark</span>
                </button>
            </div>
        </div>
    </header>

    <div class="container">
        <div id="app">
            <div class="loading">
                <div class="loading__spinner"></div>
                <p>Loading data from cluster...</p>
            </div>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeButton(isDark);
        }

        function updateThemeButton(isDark) {
            const icon = document.getElementById('theme-icon');
            const text = document.getElementById('theme-text');
            if (icon && text) {
                icon.textContent = isDark ? '☀️' : '🌙';
                text.textContent = isDark ? 'Light' : 'Dark';
            }
        }

        // Update button state to match current theme
        updateThemeButton(document.documentElement.classList.contains('dark-mode'));
    </script>
    <script src="app.js"></script>
</body>
</html>
